# Edit this file to your sources and preferences.
# Channel URLs: use the channel's main URL — the script appends /videos.
# Examples:
#   https://www.youtube.com/@hubermanlab
#   https://www.youtube.com/@lexfridman
#   https://www.youtube.com/c/SomeChannelName
#   https://www.youtube.com/channel/UCxxxxxxxxxxxxxx

channels:
  - https://www.youtube.com/@REPLACE_ME_1
  - https://www.youtube.com/@REPLACE_ME_2
  - https://www.youtube.com/@REPLACE_ME_3

# Pick a niche and stick to it. Mixing niches kills the algorithm.
# Tag your shorts so YouTube knows the topic.
hashtags:
  - podcast
  - clips
  - shorts

# Quota / safety controls
max_uploads_per_day: 5         # YT Data API free quota = 10,000/day. ~1,600/upload.
clips_per_video: 3             # how many clips to attempt per source video

# Clip length — Shorts must be <=60s. 25-50s tends to perform best.
min_clip_seconds: 25
max_clip_seconds: 58

# Filter out tiny shorts and full-length 3hr movies — pick a sweet spot.
min_source_seconds: 600        # 10 min
max_source_seconds: 14400      # 4 hr
