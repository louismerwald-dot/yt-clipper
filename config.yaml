# yt-clipper config — AI/Tech podcast niche
# Edit this file to your sources and preferences.

channels:
  - https://www.youtube.com/@DwarkeshPatel
  - https://www.youtube.com/@aiexplained-official
  - https://www.youtube.com/@MachineLearningStreetTalk
  - https://www.youtube.com/@matthew_berman
  - https://www.youtube.com/@LennysPodcast

# Hashtags appended to every clip's description for algorithm targeting
hashtags:
  - ai
  - artificialintelligence
  - chatgpt
  - tech
  - podcast
  - aiclips
  - machinelearning

# Quota / safety controls
max_uploads_per_day: 5         # YT Data API free quota = 10,000/day. ~1,600/upload.
clips_per_video: 3             # how many clips to attempt per source video

# Clip length — Shorts must be <=60s. 25-50s tends to perform best.
min_clip_seconds: 25
max_clip_seconds: 58

# Filter out tiny shorts and full-length 3hr movies — pick a sweet spot.
min_source_seconds: 600        # 10 min
max_source_seconds: 14400      # 4 hr
