# yt-clipper config
#
# DAY-OF-WEEK ROTATION:
# The script picks ONE channel per day based on UTC weekday:
#   Monday    -> channels[0]   (DwarkeshPatel)
#   Tuesday   -> channels[1]   (matthew_berman)
#   Wednesday -> channels[2]   (aiexplained-official)
#   Thursday  -> channels[3]   (LennysPodcast)
#   Friday    -> channels[4]   (MachineLearningStreetTalk)
#   Saturday  -> wraps to channels[0]
#   Sunday    -> wraps to channels[1]
# It downloads ONE video, makes 3 clips, uploads them, done for the day.
# This keeps Gemini API and YouTube cookies happy.

channels:
  - https://www.youtube.com/@DwarkeshPatel
  - https://www.youtube.com/@matthew_berman
  - https://www.youtube.com/@aiexplained-official
  - https://www.youtube.com/@LennysPodcast
  - https://www.youtube.com/@MachineLearningStreetTalk

hashtags:
  - ai
  - artificialintelligence
  - chatgpt
  - tech
  - podcast
  - aiclips
  - machinelearning

# Clips from today's one video
clips_per_video: 3

# Clip length - Shorts must be <=60s. 25-50s tends to perform best.
min_clip_seconds: 25
max_clip_seconds: 58

# Filter out tiny shorts and full-length 3hr movies
min_source_seconds: 600        # 10 min
max_source_seconds: 14400      # 4 hr
