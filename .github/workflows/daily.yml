name: daily-clipper

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Deno (yt-dlp JS runtime)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U --pre "yt-dlp[default]"

      - name: Run clipper
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          YT_COOKIES:        ${{ secrets.YT_COOKIES }}
        run: python clipper.py

      - name: Commit state
        run: |
          git config user.name  "yt-clipper-bot"
          git config user.email "yt-clipper-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "state: update processed videos"
          git push || true
